<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { DataMovie } from "./data/dataMovie.js"
      import { NavBar } from "./component/NavBar/script.js";
      import { Movies } from "./component/Movies/script.js";
      import { Detail } from "./component/MovieDetail/script.js";
      import { Category } from "./component/MovieCategory/script.js";
      
      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.handlerHome = function () {
        C.start();
      };

      C.handlerMovie = function () {
        V.renderCategory("C.handlerCategory()");
      };

      C.handlerDetail = async function (id) {
        let details = await DataMovie.requestMoviesDetails(id);
        V.renderDetail(details);
      };

      C.handlerCategory = async function(){
        let form = document.querySelector('.category-form');
        let fd = new FormData(form);
        let res = await DataMovie.requestMovies(fd);
        V.renderMovies(res);
        V.renderNavBar("C.handlerAbout()", "C.handlerHome()", "C.handlerMovie()");
      };

      C.start = function () {
        V.renderNavBar("C.handlerAbout()", "C.handlerHome()", "C.handlerMovie()");
      };

      

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, hHome, hCategory) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome, hCategory);
      };

      V.renderMovies = function (DataMovie) {
        let content = document.querySelector("#content");
        content.innerHTML = Movies.format(DataMovie);
      };
      
      V.renderDetail = function (MovieDetail) {
        let content = document.querySelector("#content");
        content.innerHTML = Detail.format(MovieDetail);
      };

      V.renderCategory = function (handler) {
        let content = document.querySelector("#header");
        content.innerHTML = Category.format(handler);
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
